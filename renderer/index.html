<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://solid-stats.ru; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' https://cdn.jsdelivr.net">
  <title>SolidStats</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- TITLEBAR -->
  <div id="titlebar">
    <div class="titlebar-drag"></div>
    <div class="titlebar-controls">
      <button class="tb-btn tb-min" id="tbMin" title="Свернуть">
        <svg viewBox="0 0 10 1"><rect width="10" height="1"/></svg>
      </button>
      <button class="tb-btn tb-max" id="tbMax" title="Развернуть">
        <svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="tb-btn tb-close" id="tbClose" title="Закрыть">
        <svg viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </div>

  <!-- STAGGER OVERLAY -->
  <div id="staggerOverlay">
    <div class="stagger-layer" data-i="0"></div>
    <div class="stagger-layer" data-i="1"></div>
    <div class="stagger-layer" data-i="2"></div>
  </div>

  <!-- WELCOME SCREEN -->
  <div id="welcomeScreen">
    <div class="w-body">

      <!-- Left (Liquid Ether background injected by liquid-ether.js) -->
      <div class="w-left">
        <div class="w-logo"><span class="w-solid">SOLID</span><span class="w-stats">STATS</span></div>
        <div class="w-sub">FROM PLAYERS <span class="w-dot">•</span> TO PLAYERS</div>
        <div class="w-pills">
          <div class="w-pill-row">
            <div class="w-pill"><span class="w-pill-name">KD</span><span class="w-pill-val green" id="wv-kd">0.00</span></div>
            <div class="w-pill"><span class="w-pill-name">УБИЙСТВА</span><span class="w-pill-val white" id="wv-kills">0</span></div>
          </div>
          <div class="w-pill-row">
            <div class="w-pill"><span class="w-pill-name">СМЕРТИ</span><span class="w-pill-val red" id="wv-deaths">0</span></div>
            <div class="w-pill"><span class="w-pill-name">ИГРЫ</span><span class="w-pill-val green" id="wv-games">0</span></div>
          </div>
        </div>
      </div>

      <div class="w-divider"></div>

      <!-- Right -->
      <div class="w-right">
        <div class="w-panel">
          <div class="w-panel-title">Добро пожаловать</div>
          <div class="w-panel-sub">Статистика и аналитика<br>проекта Solid Games · Arma 3</div>
          <button class="w-enter-btn" id="enterBtn">
            Войти в приложение
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
          <div class="w-note">Раннее тестирование · <span>SolidGames</span></div>
        </div>
      </div>

    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appShell">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg class="logo-chart" viewBox="0 0 220 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#2ed9a0" stop-opacity="0.4"/>
              <stop offset="100%" stop-color="#2ed9a0" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="M0,48 L20,40 L40,44 L60,30 L80,34 L100,22 L120,26 L140,14 L160,18 L180,8 L200,10 L220,4 L220,56 L0,56 Z" fill="url(#lg)"/>
          <path d="M0,48 L20,40 L40,44 L60,30 L80,34 L100,22 L120,26 L140,14 L160,18 L180,8 L200,10 L220,4" fill="none" stroke="#2ed9a0" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
        <span class="logo-solid">SOLID</span><span class="logo-stats">STATS</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#squads" class="nav-item" data-page="squads">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Отряды
        </a>
        <a href="#players" class="nav-item" data-page="players">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Игроки
        </a>
      </nav>

      <div class="sidebar-bottom">
        <a href="#settings" class="nav-item" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Настройки
        </a>
        <div class="update-status" id="updateStatus">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Проверка...</span>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar" id="topbar">
        <div class="topbar-title" id="topbarTitle">Отряды</div>
        <div class="topbar-controls" id="topbarControls"></div>
      </header>
      <main class="page-content" id="pageContent">
        <div class="loading-screen">
          <div class="spinner"></div>
          <p>Загрузка...</p>
        </div>
      </main>
    </div>

  </div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- App scripts -->
  <script src="js/bootstrap.js"></script>
  <script src="js/rotating-text.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/squads.js"></script>
  <script src="js/pages/players.js"></script>
  <script src="js/pages/player.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>

  <!-- Titlebar -->
  <script src="js/titlebar.js"></script>

  <!-- Three.js + Liquid Ether -->
  <script src="../node_modules/three/build/three.min.js"></script>
  <script src="js/liquid-ether.js"></script>

</body>
</html>
